<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Consumo de APIs</title>

  <!-- Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
    }

    button:hover {
      background-color: #45a049;
    }

    #data-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background-color: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

  </style>
</head>

<body>

  <h1>Personajes Rick & Morty</h1>

  <button id="fetch-btn">
    Obtener con Fetch
  </button>

  <button id="axios-btn">
    Obtener con Axios
  </button>

  <div id="data-container"></div>

  <script src="script.js"></script>

</body>
</html>
