<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Eventos</title>

  <!-- Archivo CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <h1>Registro de Eventos</h1>

  <form id="registroEvento">

    <label for="nombre">Nombre completo:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="correo">Correo electrónico:</label>
    <input type="email" id="correo" name="correo" required>

    <label for="telefono">Teléfono:</label>
    <input type="tel" id="telefono" name="telefono" required>

    <label>Intereses:</label>

    <label>
      <input type="checkbox" name="intereses" value="Tecnología">
      Tecnología
    </label>

    <label>
      <input type="checkbox" name="intereses" value="Negocios">
      Negocios
    </label>

    <label>
      <input type="checkbox" name="intereses" value="Arte">
      Arte
    </label>

    <label>Horario preferido:</label>

    <label>
      <input type="radio" name="horario" value="Mañana" required>
      Mañana
    </label>

    <label>
      <input type="radio" name="horario" value="Tarde">
      Tarde
    </label>

    <label>
      <input type="radio" name="horario" value="Noche">
      Noche
    </label>

    <label for="fecha">Fecha del evento:</label>
    <input type="date" id="fecha" name="fecha" required>

    <label for="hora">Hora preferida:</label>
    <input type="time" id="hora" name="hora" required>

    <label for="archivo">
      Documento de identificación (opcional):
    </label>

    <input type="file" id="archivo" name="archivo">

    <button type="submit">Registrarse</button>

  </form>

  <!-- Archivo JS -->
  <script src="script.js"></script>

</body>
</html>
