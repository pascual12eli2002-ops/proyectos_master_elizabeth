<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Adivina el número</title>
</head>

<body>

  <h1>Adivina el número 🎯</h1>

  <p>
    La computadora generó un número
    entre 1 y 100.
  </p>

  <input
    type="number"
    id="numero"
    placeholder="Ingresa un número"
  />

  <button id="adivinar">
    Adivinar
  </button>

  <p id="mensaje"></p>

  <script type="module"
          src="/main.js"></script>

</body>
</html>
